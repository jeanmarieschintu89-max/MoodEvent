# =============================
# MoodEvent - Configuration
# =============================
# Ce fichier est sauvegardé automatiquement par le plugin.
# Il garde le dernier événement préparé, sa description,
# son type et son point de téléportation.

event:
  name: ""
  description: ""
  type: "AUTRE"
  queue-open: false
  location:
    world: ""
    x: 0.0
    y: 0.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0

# Durées configurables des mini-jeux générés.
# Aucun chrono de Mine en folie n'est calculé automatiquement dans le code.
# Si une valeur manque ou vaut 0, la génération est refusée.
generated-games:
  ruee-or:
    durations:
      petit: 60
      moyen: 100
      grand: 140
      geant: 180
      custom: 120
