name: Déploiement Minestrator

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action à lancer"
        required: true
        type: choice
        options:
          - "1 - Build et déploie Minestrator"
          - "2 - Redémarrage + message"
      restart_after_deploy:
        description: "Redémarrer après le déploiement"
        required: true
        type: boolean
        default: true
      server_message:
        description: "Message envoyé au serveur avant redémarrage"
        required: false
        default: "§8----- §6✦ Déploiement MoodCraft ✦ §8-----\n§e➜ §fMise à jour des plugins en cours.\n§8• §7Le serveur redémarre dans quelques instants.\n§8-----------------------------"

jobs:
  build-et-deploiement:
    name: "1 - Build et déploie Minestrator"
    if: ${{ github.event.inputs.action == '1 - Build et déploie Minestrator' }}
    runs-on: ubuntu-latest

    steps:
      - name: "Récupération du code"
        uses: actions/checkout@v4

      - name: "Installation Java 21"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: "Compilation Maven"
        run: mvn -B clean package

      - name: "Préparation des plugins"
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy
          find . -path "*/target/*.jar" \
            ! -name "original-*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -exec cp {} deploy/ \;
          echo "Plugins préparés :"
          ls -lah deploy

      - name: "Envoi des plugins vers Minestrator"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MINESTRATOR_HOST }}
          username: ${{ secrets.MINESTRATOR_USERNAME }}
          password: ${{ secrets.MINESTRATOR_PASSWORD }}
          port: ${{ secrets.MINESTRATOR_PORT }}
          source: "deploy/*.jar"
          target: ${{ secrets.MINESTRATOR_PLUGINS_PATH }}
          strip_components: 1
          overwrite: true

      - name: "Message et redémarrage après déploiement"
        if: ${{ github.event.inputs.restart_after_deploy == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MINESTRATOR_HOST }}
          username: ${{ secrets.MINESTRATOR_USERNAME }}
          password: ${{ secrets.MINESTRATOR_PASSWORD }}
          port: ${{ secrets.MINESTRATOR_PORT }}
          script: |
            cd "${{ secrets.MINESTRATOR_SERVER_PATH }}"
            if [ -p "server.stdin" ]; then
              printf '%s\n' 'say ${{ github.event.inputs.server_message }}' > server.stdin
              sleep 5
              printf '%s\n' 'restart' > server.stdin
            elif command -v screen >/dev/null 2>&1 && screen -list | grep -q "${{ secrets.MINESTRATOR_SCREEN_NAME }}"; then
              screen -S "${{ secrets.MINESTRATOR_SCREEN_NAME }}" -p 0 -X stuff "say ${{ github.event.inputs.server_message }}$(printf '\r')"
              sleep 5
              screen -S "${{ secrets.MINESTRATOR_SCREEN_NAME }}" -p 0 -X stuff "restart$(printf '\r')"
            else
              echo "Aucun canal console trouvé. Plugins déployés, redémarrage manuel requis."
            fi

  redemarrage-message:
    name: "2 - Redémarrage + message"
    if: ${{ github.event.inputs.action == '2 - Redémarrage + message' }}
    runs-on: ubuntu-latest

    steps:
      - name: "Message et redémarrage Minestrator"
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MINESTRATOR_HOST }}
          username: ${{ secrets.MINESTRATOR_USERNAME }}
          password: ${{ secrets.MINESTRATOR_PASSWORD }}
          port: ${{ secrets.MINESTRATOR_PORT }}
          script: |
            cd "${{ secrets.MINESTRATOR_SERVER_PATH }}"
            if [ -p "server.stdin" ]; then
              printf '%s\n' 'say ${{ github.event.inputs.server_message }}' > server.stdin
              sleep 5
              printf '%s\n' 'restart' > server.stdin
            elif command -v screen >/dev/null 2>&1 && screen -list | grep -q "${{ secrets.MINESTRATOR_SCREEN_NAME }}"; then
              screen -S "${{ secrets.MINESTRATOR_SCREEN_NAME }}" -p 0 -X stuff "say ${{ github.event.inputs.server_message }}$(printf '\r')"
              sleep 5
              screen -S "${{ secrets.MINESTRATOR_SCREEN_NAME }}" -p 0 -X stuff "restart$(printf '\r')"
            else
              echo "Aucun canal console trouvé. Redémarrage manuel requis."
            fi
